<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автосервиз - Motorsport График</title>
    <style>
        body { 
            font-family: 'Arial Black', Arial, sans-serif; 
            /* Motorsport Дизайн - Асфалт и спортни линии */
            background: 
                radial-gradient(at 0% 0%, rgba(231, 76, 60, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(46, 204, 113, 0.1) 0px, transparent 50%),
                linear-gradient(135deg, #111827 0%, #030712 100%);
            background-attachment: fixed;
            margin: 0; 
            padding: 12px; 
            color: #fff; 
            max-width: 600px; 
            margin: 0 auto; 
            min-height: 100vh;
        }
        
        h2 { 
            text-align: center; 
            color: #ffffff; 
            margin: 15px 0 5px 0; 
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8), 0 0 10px rgba(231, 76, 60, 0.5);
        }
        
        .box { 
            background: rgba(255, 255, 255, 0.06); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 14px; 
            border-radius: 12px; 
            margin-bottom: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); 
        }
        
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-weight: bold; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .cal-btn { background: #e74c3c; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 10px rgba(231, 76, 60, 0.4); }
        .cal-btn:hover { background: #c0392b; transform: scale(1.05); }
        
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
        .cal-weekday { font-weight: bold; font-size: 0.85rem; color: #9ca3af; padding-bottom: 5px; text-transform: uppercase; }
        
        .cal-cell { padding: 10px 0; font-size: 1rem; cursor: pointer; border-radius: 8px; font-weight: bold; border: 2px solid transparent; transition: 0.15s; }
        .cal-cell.empty { cursor: default; background: transparent !important; }
        
        .day-green { background-color: #2ecc71; color: white; box-shadow: 0 2px 6px rgba(46, 204, 113, 0.3); }
        .day-red { background-color: #e74c3c; color: white; box-shadow: 0 2px 6px rgba(231, 76, 60, 0.3); }
        
        .day-active { border-color: #3498db !important; box-shadow: 0 0 12px #3498db !important; transform: scale(1.05); }
        
        .date-title { font-size: 1.2rem; font-weight: bold; color: white; margin: 18px 0 12px 0; text-align: center; background: linear-gradient(90deg, #e74c3c, #c0392b); padding: 10px; border-radius: 8px; box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3); text-transform: uppercase; letter-spacing: 1px; }
        
        .slot { background: #1f2937; border-radius: 10px; padding: 14px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.4); border-left: 6px solid #2ecc71; color: #f3f4f6; font-family: Arial, sans-serif; }
        .slot.busy { border-left-color: #e74c3c; background: #251c1c; }
        
        .time { font-family: 'Arial Black', sans-serif; font-size: 1.25rem; font-weight: bold; color: #fff; margin-bottom: 6px; }
        .info { font-size: 0.95rem; margin-bottom: 10px; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 6px; line-height: 1.5; border: 1px solid rgba(255,255,255,0.05); }
        
        .input-group input { width: 100%; padding: 10px; margin-bottom: 6px; box-sizing: border-box; border: 1px solid #4b5563; background: #111827; color: white; border-radius: 6px; font-size: 0.9rem; transition: 0.2s; }
        .input-group input:focus { border-color: #2ecc71; outline: none; background: #1f2937; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; }
        .btn-save { background: #2ecc71; color: white; box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3); }
        .btn-save:hover { background: #27ae60; }
        .btn-delete { background: #e74c3c; color: white; box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3); }
        .btn-delete:hover { background: #c0392b; }
        
        .status-sync { text-align: center; font-size: 0.9rem; font-weight: bold; color: #2ecc71; margin-bottom: 15px; text-shadow: 0 0 8px rgba(46, 204, 113, 0.6); text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
